    <main>
        <section id="projects">
<div class="container">
  <h1>Finances Manager</h1>
  <form id="debtForm">
    <input type="text" id="creditor" placeholder="Creditor" required>
    <input type="number" id="balance" placeholder="Balance" required>
    <input type="number" id="minimumPayment" placeholder="Minimum Payment" required>
    <input type="number" id="interestRate" placeholder="Interest Rate (%)" required>
    <button type="submit">Add to Table</button>
  </form>
  <table id="debtTable">
    <thead>
      <tr>
        <th>Creditor</th>
        <th>Balance</th>
        <th>Minimum Payment</th>
        <th>Interest Rate (%)</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Table rows will be added here -->
    </tbody>
    <tfoot>
      <tr>
        <td colspan="4">Total Balance:</td>
        <td id="totalBalance">0</td>
      </tr>
    </tfoot>
  </table>
