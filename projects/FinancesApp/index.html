<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Entry Form with Editable Rows</title>
<link rel="stylesheet" href="styles.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


</head>
<body>

<div class="container">
  <h1>Debt Entry Form</h1>
  <form id="debtForm">
    <input type="text" id="creditor" placeholder="Creditor" required>
    <input type="number" id="balance" placeholder="Balance" required>
    <input type="number" id="minimumPayment" placeholder="Minimum Payment" required>
    <input type="number" id="interestRate" placeholder="Interest Rate (%)" required>
    <button type="submit">Add to Table</button>
  </form>
  <table id="debtTable">
    <thead>
      <tr>
        <th>Creditor</th>
        <th>Balance</th>
        <th>Minimum Payment</th>
        <th>Interest Rate (%)</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Table rows will be added here -->
    </tbody>
    <tfoot>
      <tr>
        <td colspan="4">Total Balance:</td>
        <td id="totalBalance">0</td>
      </tr>
    </tfoot>
  </table>
</div>

<script src="script.js"></script>


</body>
</html>
